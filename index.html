    <!-- ===== STRUCTURED DATA — Organization ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "GAMSAJ International Limited",
      "alternateName": "GAMSAJ",
      "url": "https://gamsaj.com",
      "logo": "https://gamsaj.com/assets/img/GamSaj Logo.png",
      "description": "Nigerian indigenous construction, civil engineering, real estate, and industrial infrastructure company. RC: 965221. Established 2011.",
      "foundingDate": "2011",
      "legalName": "GAMSAJ International Limited",
      "taxID": "RC965221",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NG",
        "addressRegion": "Nigeria"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://gamsaj.com"
      ]
    }
    </script>

    <!-- ===== STRUCTURED DATA — LocalBusiness ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "GeneralContractor",
      "name": "GAMSAJ International Limited",
      "url": "https://gamsaj.com",
      "logo": "https://gamsaj.com/assets/img/GamSaj Logo.png",
      "image": "https://gamsaj.com/assets/img/GamSaj Logo.png",
      "description": "Construction, civil engineering, real estate and industrial infrastructure services in Nigeria.",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NG"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Nigeria"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Construction & Engineering Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Civil Engineering" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Building Construction" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Real Estate Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Industrial Infrastructure" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Road Construction" } }
        ]
      }
    }
    </script>

    <!-- ===== STRUCTURED DATA — WebSite (enables Google Sitelinks Search) ===== -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "GAMSAJ International Limited",
      "url": "https://gamsaj.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://gamsaj.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ===== SPLASH SCREEN ===== -->
    <style>
      #splash-screen {
        position: fixed;
        top: 50%; left: 50%;
        background: white;
        display: flex;
        height: 100%; width: 100%;
        transform: translate(-50%, -50%);
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 1;
        transition: all 15s linear;
        overflow: hidden;
      }
      #splash-screen.remove {
        animation: fadeout 0.7s forwards;
        z-index: 0;
      }
      @keyframes fadeout {
        to { opacity: 0; visibility: hidden; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash-screen">
      <img alt="GAMSAJ International Limited" src="/GamSaj Logo.png" style="height: 80px; width: auto;" />
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const rootEl = document.querySelector('#root')
      new MutationObserver(() => {
        document.querySelector('#splash-screen')?.classList.add('remove');
      }).observe(rootEl, { childList: true });
    </script>
  </body>
</html>
