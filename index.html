<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/GamSaj favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GAMSAJ International Limited - Nigerian indigenous construction, real estate, infrastructure, and industrial engineering company. Established 2011, RC: 965221" />
    <meta name="keywords" content="construction, civil engineering, infrastructure, industrial construction, real estate, Nigeria, GAMSAJ" />
    <title>GAMSAJ International Limited | Construction & Engineering Excellence</title>
     
  <style>
    #splash-screen {
      position: fixed;
      top: 50%;
      left: 50%;
      background: white;
      display: flex;
      height: 100%;
      width: 100%;
      transform: translate(-50%, -50%);
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 1;
      transition: all 15s linear;
      overflow: hidden;
    }
    #splash-screen.remove {
      animation: fadeout 0.7s forwards;
      z-index: 0;
    }
    @keyframes fadeout {
      to { opacity: 0; visibility: hidden; }
    }
  </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash-screen">
      <img alt="GAMSAJ International Limited" src="/GamSaj Logo.png" style="height: 80px;" />
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const rootEl = document.querySelector('#root')
      new MutationObserver(() => {
        document.querySelector('#splash-screen')?.classList.add('remove');
      }).observe(rootEl, { childList: true });
    </script>
  </body>
</html>
