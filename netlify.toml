[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://gamsaj-api.onrender.com/api"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Canonical domain redirect — www → non-www
[[redirects]]
  from = "https://www.gamsaj.com/*"
  to = "https://gamsaj.com/:splat"
  status = 301
  force = true

# HTTP → HTTPS (Netlify handles this but explicit is better)
[[redirects]]
  from = "http://gamsaj.com/*"
  to = "https://gamsaj.com/:splat"
  status = 301
  force = true

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security + SEO headers on all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection = "1; mode=block"
